<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Module Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="toolbar card">
      <div class="toolbar-group actions">
        <button id="applyAnimatedBtn">Apply All Rules Sequentially</button>
        <button id="applyInstantBtn">Apply All Rules Instantly</button>
        <button id="stepRuleBtn">Apply Next Rule ONLY</button>
      </div>
      <div class="toolbar-group actions">
        <button id="clearBtn" class="secondary">Clear</button>
        <button id="fillBtn" class="secondary">Fill with ON</button>
        <button id="rotateLeftBtn" class="secondary">Rotate Left</button>
        <button id="rotateRightBtn" class="secondary">Rotate Right</button>
        <button id="resetRotationBtn" class="secondary">Reset Rotation</button>
        <!-- <button id="printBtn" class="secondary">Print Grid</button> -->
      </div>
      <div class="toolbar-group controls">
        <label>
          <span>Ruleset</span>
          <select id="rulesetSelect"></select>
        </label>

        <label class="delay-control">
          <span>Sequential Delay per cell (<strong id="delayValue">100</strong> ms)</span>
          <input id="delaySlider" type="range" min="1" max="1500" step="1" value="100" />
        </label>
      </div>

      <div class="logic-controls">

        <label>
          <span>3-in-row match type</span>
          <select id="threeSequenceModeSelect">
            <option value="on_only">ON cells only</option>
            <option value="uniform">ON or OFF cells</option>
          </select>
        </label>

        <label>
          <span>3-in-row scope</span>
          <select id="threeScopeModeSelect">
            <option value="contiguous">Cell must be in sequence</option>
            <option value="row_has_sequence">Sequence anywhere in row</option>
            <option value="whole_row">3+ cells anywhere in row</option>
          </select>
        </label>

        <label>
          <span>Neighbor definition</span>
          <select id="neighborModeSelect">
            <option value="cardinal">Cardinal (N,S,E,W)</option>
            <option value="eight_way">8-direction (Minesweeper)</option>
          </select>
        </label>

        <label>
          <span>Column/Row Numbering</span>
          <select id="indexBaseModeSelect">
            <option value="one_based">1-based</option>
            <option value="zero_based">0-based</option>
          </select>
        </label>

      </div>
    </header>

    <section class="info-row card">
      <div>Use the Drop-downs Above to Change Rule Logic</div>
    </section>

    <main class="main-layout">
      <section class="card grid-panel">
        <div id="grid" class="grid" aria-label="Rule grid"></div>
      </section>

      <section class="side-panel">
        <section class="card panel-block">
          <h2>Rules</h2>
          <pre id="rulesText" class="panel-text"></pre>
        </section>

        <section class="card panel-block log-block">
          <div class="toolbar-group">  
            <h2>Log</h2>
            <button id="clearLogBtn" class="log">Clear Log</button>
          </div>
          <pre id="logText" class="panel-text"></pre>
        </section>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
